[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^perf", group = "Performance" },
    { message = "^docs", group = "Documentation" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore", group = "Build/Misc" },
    { message = "^build", group = "Build/Misc" },
    { message = "^doc\\b", group = "Documentation" },
    { message = "^data", skip = true },
    { message = "^test", group = "Tests" },
    { message = "^ci", group = "CI" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"

[changelog]
header = """
# Changelog
All notable changes to this project will be documented in this file.

"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
        {% if commit.breaking %} **(breaking)**{% endif %}\
        {% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/IMBArator/miniDSP-Linux/pull/{{ commit.remote.pr_number }})){% endif %} \
        ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/IMBArator/miniDSP-Linux/commit/{{ commit.id }}))\
    {% endfor %}
{% endfor %}

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
trim = true

[remote.github]
owner = "IMBArator"
repo = "miniDSP-Linux"
