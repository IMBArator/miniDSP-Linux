# Protocol configuration for the t.racks DSP 4x4 Mini (Musicrown)
# This file is the single source of truth for protocol analysis.
# Update it whenever new opcodes or field meanings are discovered.

[device]
vendor_id = 0x0168
product_id = 0x0821
report_size = 64
manufacturer = "Musicrown"
product = "Dsp Process"
out_endpoint = 0x02
in_endpoint = 0x81

[frame]
stx = [0x10, 0x02]
etx = [0x10, 0x03]
src_host = 0x00
src_device = 0x01
dst_device = 0x01
dst_host = 0x00

[frame.footer]
# Static 8-byte footer at bytes 56-63 of every IN report
offset = 56
value = "0010033d000abc8d"
description = "Device identifier / firmware version (0x000abc8d = 703629)"

[noise]
# Byte positions within level response payload to mask (noisy instant bytes)
# These are payload-relative offsets for 0x40 responses
level_instant_offsets = [3, 6, 9, 12, 15, 18, 21, 24]
# HID report positions to ignore during comparison
footer_offset = 56
# Zero padding between CHK and footer is also noise


# ──────────────────────────────────────────────
# Opcodes: verified = captured on our 4x4 Mini
# ──────────────────────────────────────────────

[opcodes.0x01]
name = "ack"
direction = "in"
description = "Generic command acknowledgment"
verified = true

[opcodes.0x10]
name = "init"
direction = "both"
description = "Init handshake (out=request, in=response with max_presets)"
verified = true

[opcodes.0x10.fields.response]
max_presets = { offset = 1, size = 1, format = "uint8" }

[opcodes.0x12]
name = "activate"
direction = "out"
description = "Config load complete / activate — device responds with ACK"
verified = true

[opcodes.0x13]
name = "firmware"
direction = "both"
description = "Firmware/model string query (out) / response with ASCII string (in)"
verified = true

[opcodes.0x13.fields.response]
model = { offset = 1, size = 12, format = "ascii" }

[opcodes.0x14]
name = "preset_index"
direction = "both"
description = "Active preset index query (out) / response (in)"
verified = true

[opcodes.0x14.fields.response]
index = { offset = 1, size = 1, format = "uint8" }

[opcodes.0x15]
name = "set_delay_unit"
direction = "out"
description = "Set delay display unit (display-only — protocol always uses samples for 0x38). Response: ACK. Persisted at config offset 424."
verified = true

[opcodes.0x15.fields.request]
unit = { offset = 1, size = 1, format = "uint8", note = "0x00=ms (default), 0x01=m (meters), 0x02=ft (feet)" }

[opcodes.0x20]
name = "load_preset"
direction = "out"
description = "Load preset by direct slot index (0=F00, 1=U01 … 30=U30). After ACK: read 9 config pages then send 0x12 activate."
verified = true

[opcodes.0x20.fields.request]
slot = { offset = 1, size = 1, format = "uint8", note = "direct index: 0=F00, 1=U01, 30=U30" }

[opcodes.0x21]
name = "store_preset"
direction = "out"
description = "Store current config to slot (1=U01 … 30=U30). WARNING: never use slot 0 (F00 factory preset — read-only). Device takes ~2s to ACK (flash write). Send 0x26 name first, then 0x21, then 0x12 activate."
verified = true

[opcodes.0x21.fields.request]
slot = { offset = 1, size = 1, format = "uint8", note = "direct index: 1=U01 … 30=U30. NEVER slot 0 (F00)!" }

[opcodes.0x22]
name = "preset_header"
direction = "both"
description = "Active preset header query (out) / response (in)"
verified = true

[opcodes.0x24]
name = "config_page"
direction = "in"
description = "Config page response (to 0x27 request)"
verified = true

[opcodes.0x24.fields.response]
page = { offset = 1, size = 1, format = "uint8" }
data = { offset = 2, size = 50, format = "hex" }

[opcodes.0x26]
name = "set_preset_name"
direction = "out"
description = "Set preset name (14-char ASCII, space-padded). Must be sent BEFORE 0x21 (store). WARNING: max 14 characters — longer names CRASH the DSP!"
verified = true

[opcodes.0x26.fields.request]
name = { offset = 1, size = 14, format = "ascii" }

[opcodes.0x27]
name = "read_config"
direction = "out"
description = "Request config page (0x00-0x08 on 4x4 Mini)"
verified = true

[opcodes.0x27.fields.request]
page = { offset = 1, size = 1, format = "uint8" }

[opcodes.0x29]
name = "read_name"
direction = "both"
description = "Read preset name (out=request, in=response)"
verified = true

[opcodes.0x29.fields.request]
slot = { offset = 1, size = 1, format = "uint8" }

[opcodes.0x29.fields.response]
slot = { offset = 1, size = 1, format = "uint8" }
name = { offset = 2, size = 14, format = "ascii" }

[opcodes.0x2a]
name = "prepare_link"
direction = "out"
description = "Prepare channel link (sent before 0x3b when linking, not unlinking)"
verified = true

[opcodes.0x2a.fields.request]
master = { offset = 1, size = 1, format = "channel" }
slave = { offset = 2, size = 1, format = "channel" }

[opcodes.0x2c]
name = "device_info"
direction = "both"
description = "Device info query (out) / response (in) — 8-byte response; byte 6 = lock flag (0x01=locked, 0x00=unlocked). Verified from 3 captures."
verified = true

[opcodes.0x2c.fields.response]
pad = { offset = 1, size = 1, format = "uint8" }
counter = { offset = 2, size = 2, format = "uint16be", note = "0x270F (9999); appears in .unt header at offset 0x19" }
lock_status = { offset = 6, size = 1, format = "uint8", note = "0x00=unlocked, 0x01=locked" }

[opcodes.0x2d]
name = "submit_pin"
direction = "both"
description = "PIN authentication for a locked device. OUT: [2d, 00, 4×ASCII digit]. IN: [2d, 00, 01=correct/00=wrong]. Device stays locked (keeps ACKing 0x12) until correct PIN received, then proceeds with normal config load."
verified = true

[opcodes.0x2d.fields.request]
pad = { offset = 1, size = 1, format = "uint8", note = "always 0x00" }
pin = { offset = 2, size = 4, format = "ascii", note = "4-digit ASCII PIN (e.g. 37 36 35 34 = '7654')" }

[opcodes.0x2d.fields.response]
pad = { offset = 1, size = 1, format = "uint8", note = "always 0x00" }
result = { offset = 2, size = 1, format = "uint8", note = "0x01=correct, 0x00=wrong" }

[opcodes.0x2f]
name = "set_lock_pin"
direction = "out"
description = "Set device lock PIN and immediately lock the device. WARNING: device disconnects from host immediately after receiving this. If PIN is lost, factory reset procedure is unknown."
verified = true

[opcodes.0x2f.fields.request]
pin = { offset = 1, size = 4, format = "ascii", note = "4-digit ASCII PIN (e.g. 37 36 35 34 = '7654')" }

[opcodes.0x30]
name = "compressor"
direction = "out"
description = "Output channel compressor/limiter — sends all 5 params in one frame (threshold, attack, release, ratio, knee)"
verified = true

[opcodes.0x30.fields.request]
channel   = { offset = 1, size = 1, format = "channel" }
ratio     = { offset = 2, size = 1, format = "comp_ratio" }
knee      = { offset = 3, size = 1, format = "comp_knee_db" }
attack    = { offset = 4, size = 2, format = "comp_attack_raw" }
release   = { offset = 6, size = 2, format = "comp_release_raw" }
threshold = { offset = 8, size = 2, format = "comp_threshold_raw" }

[opcodes.0x31]
name = "lopass_crossover"
direction = "out"
description = "Low-pass crossover filter (log freq 0-300, slope/bypass byte)"
verified = true

[opcodes.0x31.fields.request]
channel = { offset = 1, size = 1, format = "channel" }
frequency = { offset = 2, size = 2, format = "freq_log" }
slope = { offset = 4, size = 1, format = "slope_index" }

[opcodes.0x32]
name = "hipass_crossover"
direction = "out"
description = "High-pass crossover filter (log freq 0-300, slope/bypass byte)"
verified = true

[opcodes.0x32.fields.request]
channel = { offset = 1, size = 1, format = "channel" }
frequency = { offset = 2, size = 2, format = "freq_log" }
slope = { offset = 4, size = 1, format = "slope_index" }

[opcodes.0x33]
name = "peq"
direction = "out"
description = "PEQ band — 10-byte payload for output channels. 7 bands per channel. Capture-verified from 7 captures on 4x4 Mini."
verified = true

[opcodes.0x33.fields.request]
channel = { offset = 1, size = 1, format = "channel" }
band = { offset = 2, size = 1, format = "uint8" }
gain = { offset = 3, size = 2, format = "peq_gain" }
frequency = { offset = 5, size = 2, format = "freq_log" }
q = { offset = 7, size = 1, format = "q_log" }
type = { offset = 8, size = 1, format = "filter_type" }
bypass = { offset = 9, size = 1, format = "bool" }

[opcodes.0x3c]
name = "peq_channel_bypass"
direction = "out"
description = "Bypass or restore all PEQ bands for an output channel. Captured from output_peq_channel_1_bypass. Config: footer byte at absolute offset 428 (Out1), one byte per channel."
verified = true

[opcodes.0x3c.fields.request]
channel = { offset = 1, size = 1, format = "channel" }
bypass = { offset = 2, size = 1, format = "bool" }

[opcodes.0x34]
name = "gain"
direction = "out"
description = "Set channel gain (dual-resolution 0-400)"
verified = true

[opcodes.0x34.fields.request]
channel = { offset = 1, size = 1, format = "channel" }
value = { offset = 2, size = 2, format = "gain_raw" }

[opcodes.0x35]
name = "mute"
direction = "out"
description = "Set channel mute state"
verified = true

[opcodes.0x35.fields.request]
channel = { offset = 1, size = 1, format = "channel" }
state = { offset = 2, size = 1, format = "mute_state" }

[opcodes.0x36]
name = "phase"
direction = "out"
description = "Set channel phase invert (0x00=normal, 0x01=inverted)"
verified = true

[opcodes.0x36.fields.request]
channel = { offset = 1, size = 1, format = "channel" }
state = { offset = 2, size = 1, format = "phase_state" }

[opcodes.0x38]
name = "delay"
direction = "out"
description = "Set output channel delay (samples at 48 kHz, 0-32640 = 0-680 ms)"
verified = true

[opcodes.0x38.fields.request]
channel = { offset = 1, size = 1, format = "channel" }
samples = { offset = 2, size = 2, format = "delay_samples" }

[opcodes.0x3e]
name = "gate"
direction = "out"
description = "Set input noise gate parameters (attack, release, hold, threshold)"
verified = true

[opcodes.0x3e.fields.request]
channel = { offset = 1, size = 1, format = "channel" }
attack = { offset = 2, size = 2, format = "gate_time", note = "raw 34-998, maps to 1-999 ms" }
release = { offset = 4, size = 2, format = "gate_time", note = "raw 0-2999, maps to 0-3000 ms" }
hold = { offset = 6, size = 2, format = "gate_time", note = "raw 9-998, maps to 10-999 ms" }
threshold = { offset = 8, size = 2, format = "gate_threshold", note = "raw 1-180, -90.0 to 0.0 dB" }

[opcodes.0x3a]
name = "matrix_routing"
direction = "out"
description = "Matrix routing — output gets input bitmask (InA=0x01,InB=0x02,InC=0x04,InD=0x08)"
verified = true

[opcodes.0x3a.fields.request]
output = { offset = 1, size = 1, format = "channel" }
input_mask = { offset = 2, size = 1, format = "input_bitmask" }

[opcodes.0x3b]
name = "channel_link"
direction = "out"
description = "Set channel link state — master gets OR of linked bits, slaves get 0x00"
verified = true

[opcodes.0x3b.fields.request]
channel = { offset = 1, size = 1, format = "channel" }
link_flags = { offset = 2, size = 1, format = "link_bitmask" }

[opcodes.0x3d]
name = "set_channel_name"
direction = "out"
description = "Set channel display name (8-byte ASCII, zero-padded). Verified: Out3 'Out3'→'AUSGANG3' sends 3d 06 41 55 53 47 41 4e 47 33"
verified = true

[opcodes.0x3d.fields.request]
channel = { offset = 1, size = 1, format = "channel" }
name = { offset = 2, size = 8, format = "ascii" }

[opcodes.0x40]
name = "poll"
direction = "both"
description = "Level poll (out: 1 byte) / Level response (in: 28 bytes with 8ch metering)"
verified = true

[opcodes.0x40.fields.response]
in1 = { offset = 1, size = 2, format = "level_uint16" }
in2 = { offset = 4, size = 2, format = "level_uint16" }
in3 = { offset = 7, size = 2, format = "level_uint16" }
in4 = { offset = 10, size = 2, format = "level_uint16" }
out1 = { offset = 13, size = 2, format = "level_uint16" }
out2 = { offset = 16, size = 2, format = "level_uint16" }
out3 = { offset = 19, size = 2, format = "level_uint16" }
out4 = { offset = 22, size = 2, format = "level_uint16" }
limiter_mask = { offset = 25, size = 1, format = "limiter_bitmask" }
state = { offset = 26, size = 1, format = "uint8", note = "0x00=normal, 0x01=high-res" }

# NOTE: 0x48 (GEQ) is NOT present on the 4x4 Mini — it is a DSP 408-only feature.


# ──────────────────────────────────────────────
# Value format definitions
# ──────────────────────────────────────────────

[formats.channel]
type = "enum"
values = { "0" = "InA", "1" = "InB", "2" = "InC", "3" = "InD", "4" = "Out1", "5" = "Out2", "6" = "Out3", "7" = "Out4" }

[formats.gain_raw]
type = "uint16le"
min = 0
max = 400
unit = "dB"
note = "raw<80: dB=raw/2-60 (0.5dB/step) | raw>=80: dB=(raw-80)/10-20 (0.1dB/step)"

[formats.mute_state]
type = "enum"
values = { "0" = "unmuted", "1" = "muted" }

[formats.phase_state]
type = "enum"
values = { "0" = "normal", "1" = "inverted" }

[formats.bool]
type = "enum"
values = { "0" = "off", "1" = "on" }

[formats.link_bitmask]
type = "bitmask"
bits = { "0" = "ch1/A", "1" = "ch2/B", "2" = "ch3/C", "3" = "ch4/D" }
note = "Within 4-channel group (inputs 0-3 or outputs 4-7)"

[formats.input_bitmask]
type = "bitmask"
bits = { "0" = "InA", "1" = "InB", "2" = "InC", "3" = "InD" }

[formats.limiter_bitmask]
type = "bitmask"
bits = { "0" = "Out1", "1" = "Out2", "2" = "Out3", "3" = "Out4" }

[formats.filter_type]
type = "enum"
values = { "0" = "Peak", "1" = "Low Shelf", "2" = "High Shelf", "3" = "Low Pass", "4" = "High Pass", "5" = "Allpass 1st", "6" = "Allpass 2nd" }

[formats.freq_log]
type = "uint16le"
min = 0
max = 300
unit = "Hz"
note = "Hz = 19.70 * (20160/19.70)^(raw/300). 4x4 Mini uses 0-300 (DSP 408 uses 0-1000)."

[formats.q_log]
type = "uint8"
min = 0
max = 100
note = "Q = 0.40 * 320^(raw/100). Min Q=0.4 (raw=0), Peak max Q=128 (raw=100), Shelf/Pass max Q=3.0 (raw=35)."

[formats.peq_gain]
type = "uint16le"
unit = "dB"
note = "dB = (raw - 120) / 10.0, range -12.0 to +12.0 (raw 0=−12dB, 120=0dB, 240=+12dB)"

[formats.delay_samples]
type = "uint16le"
unit = "samples"
note = "ms = raw / 48 (48 kHz sample rate). Range 0-32640 = 0-680 ms"

[formats.gate_time]
type = "uint16le"
unit = "ms"
note = "Raw value in ms (approximately). See per-field notes for exact ranges."

[formats.gate_threshold]
type = "uint16le"
unit = "dB"
note = "dB = raw * 0.5 - 90.0, range -90.0 to 0.0 dB (0.5 dB/step)"

[formats.level_uint16]
type = "uint16le"
unit = "linear"
note = "dB = 20*log10(level/1153), 63 dB range. 0dBu~188, -30dBu~5"

[formats.slope_index]
type = "enum"
values = { "0" = "off", "1" = "BW-6", "2" = "BL-6", "3" = "BW-12", "4" = "BL-12", "5" = "LR-12", "6" = "BW-18", "7" = "BL-18", "8" = "BW-24", "9" = "BL-24", "10" = "LR-24" }
note = "0=bypassed, 1-10=active slope. Verified from slope sweep capture. LR-24 (0x0a) is device default. Bypass loses slope state — app must remember and re-send on un-bypass."

[formats.comp_threshold_raw]
type = "uint16le"
min = 0
max = 220
unit = "dB"
note = "dB = raw/2 - 90. Range: 0=-90.0dB to 220=+20.0dB, resolution 0.5dB/step. Verified: endpoints confirmed from threshold sweep capture (capture_20260407_184757)."

[formats.comp_attack_raw]
type = "uint16le"
min = 0
max = 998
unit = "ms"
note = "ms = raw + 1. Range: 0=1ms to 998=999ms. Default raw 49=50ms. Verified from attack sweep capture (capture_20260407_184842)."

[formats.comp_release_raw]
type = "uint16le"
min = 9
max = 2999
unit = "ms"
note = "ms = raw + 1. Range: 9=10ms to 2999=3000ms. Default raw 499=500ms. Verified from release sweep capture (capture_20260407_185003)."

[formats.comp_ratio]
type = "enum"
values = { "0" = "1:1.0", "1" = "1:1.1", "2" = "1:1.3", "3" = "1:1.5", "4" = "1:1.7", "5" = "1:2.0", "6" = "1:2.5", "7" = "1:3.0", "8" = "1:3.5", "9" = "1:4.0", "10" = "1:5.0", "11" = "1:6.0", "12" = "1:8.0", "13" = "1:10.0", "14" = "1:20.0", "15" = "Limit" }
note = "16-entry enum, 0-indexed. 0=1:1.0 (no compression), 15=hard limiter. Verified from ratio sweep capture (capture_20260407_185056)."

[formats.comp_knee_db]
type = "uint8"
min = 0
max = 12
unit = "dB"
note = "Direct dB value, 1dB steps (0=hard knee, 12=softest). Verified from knee sweep capture (capture_20260407_185154)."
